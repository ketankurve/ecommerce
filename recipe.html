<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Details - Organic Store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="index.html"
          ><img
            src="images/logo.webp"
            alt="Local Organic Store"
            onerror="this.src = ''"
        /></a>
      </div>
      <nav class="nav-links">
        <a href="index.html">← Back to Shop</a>
      </nav>
    </header>

    <main class="recipe-wrapper">
      <div class="recipe-detail" id="recipeContainer"></div>
    </main>

    <script>
      const recipes = {
        "green-smoothie": {
          title: "Green Detox Smoothie",
          img: "images/recipe1.jpg",
          description: "A refreshing mix of kale, banana, and coconut water.",
          details:
            "Blend together 1 banana, 1 cup kale, 1/2 cup coconut water, and 1 tsp chia seeds. Enjoy chilled!",
        },
        "veggie-bowl": {
          title: "Rainbow Veggie Bowl",
          img: "images/recipe2.jpg",
          description: "Colorful veggies tossed with organic olive oil.",
          details:
            "Combine chopped bell peppers, shredded carrots, cherry tomatoes, spinach, and quinoa. Dress with olive oil, lemon juice, and herbs.",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const recipeKey = params.get("recipe");
      const container = document.getElementById("recipeContainer");

      if (recipes[recipeKey]) {
        const recipe = recipes[recipeKey];
        container.innerHTML = `
                <img src="${recipe.img}" alt="${recipe.title}" onerror="this.style.display='none'">
                <h1>${recipe.title}</h1>
                <p class="recipe-desc"><strong>${recipe.description}</strong></p>
                <div class="recipe-instructions">
                    <p>${recipe.details}</p>
                </div>
                <a href="index.html#category-products" class="btn buy-now-btn" style="margin-top: 20px; display: inline-block;">Shop Ingredients</a>
            `;
      } else {
        container.innerHTML = `<h2>Recipe not found.</h2><a href="index.html">Go Back</a>`;
      }
    </script>
  </body>
</html>
